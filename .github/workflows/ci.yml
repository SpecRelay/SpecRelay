name: CI

# Minimal, reliable verification gate for the standalone SpecRelay repository
# (spec 0007, section 2). It runs the same three baseline commands a developer
# runs locally — nothing host-repo-specific, nothing that needs a real Claude
# installation, and nothing from Sprint-reports.
on:
  push:
    branches: [main]
  pull_request:

# Read-only token: CI only verifies, it never pushes, tags, or releases.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (scripts/test, doctor, version)
    runs-on: ubuntu-latest
    env:
      # Claude is an OPTIONAL provider and is intentionally NOT installed here,
      # so run doctor in provider-optional mode: an absent provider CLI is a
      # documented advisory warning, while every CORE dependency check (git,
      # project root, config, spec root, task-runtime root) stays mandatory.
      # This is how CI stays green without requiring a real Claude, without
      # ignoring exit codes, and without hiding real failures. See
      # docs/installation.md (Environment variables).
      SPECRELAY_PROVIDER_OPTIONAL: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          bash --version | head -n1
          git --version
          python3 --version
          ruby --version

      # GitHub-hosted runners have NO global Git identity. The test suite pins a
      # deterministic LOCAL identity into each fixture repo (see
      # test/test_helper.sh), so this is belt-and-suspenders: it guarantees any
      # Git operation that runs outside a fixture repo still has a harmless,
      # non-personal identity and never fails with "Author identity unknown".
      - name: Configure a harmless Git identity
        run: |
          git config --global user.name "SpecRelay CI"
          git config --global user.email "specrelay-ci@example.invalid"

      - name: Run standalone test suite
        # Parallel runner (spec 0016): --jobs auto uses min(logical CPUs, 8),
        # which is safely bounded on small hosted runners. --timings prints the
        # per-file timing summary and slowest files so a slow regression is
        # visible in the CI log. Output stays deterministic, append-only, and
        # needs no TTY/ANSI. A full re-run of the suite in scripts/smoke is
        # avoided elsewhere via `scripts/smoke --skip-tests`.
        run: scripts/test --jobs auto --timings

      - name: Run readiness diagnostics (doctor)
        run: bin/specrelay doctor

      - name: Print engine version
        run: bin/specrelay version
