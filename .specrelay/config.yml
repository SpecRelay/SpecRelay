version: 1

project:
  name: specrelay

specs:
  root: docs/specs

tasks:
  runs_root: .specrelay-runs/tasks
  max_iterations: 3

roles:
  executor:
    provider: claude
    model: fable-5
    agent: none

  reviewer:
    provider: claude-subagent
    model: claude-opus-4-8
    agent: ai-reviewer

context:
  adapter: none
  required: false

validation:
  full_test_command: scripts/test

policy:
  human_final_review_required: true
