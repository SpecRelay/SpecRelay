version: 1

project:
  name: specrelay

specs:
  root: docs/specs

tasks:
  runs_root: .specrelay-runs/tasks
  max_iterations: 3

roles:
  executor:
    provider: claude
    model: claude-sonnet-5
    agent: none

  reviewer:
    provider: claude-subagent
    model: claude-opus-4-8
    agent: ai-reviewer

context:
  adapter: contextplus
  required: true

validation:
  full_test_command: scripts/test

policy:
  human_final_review_required: true
