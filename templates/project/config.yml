# .specrelay/config.yml — SpecRelay project configuration.
#
# Written by `specrelay init`. This file holds ONLY project-specific
# configuration and policy — never reusable engine code, never secrets or
# provider credentials, and never machine-specific absolute paths.
#
# The defaults below are the provider-neutral public defaults. Edit them for
# your project. See the bundled docs/configuration.md for every key.
version: 1

project:
  name: __SPECRELAY_PROJECT_NAME__

specs:
  # Where specification documents live, relative to the project root.
  # Convention: <root>/<task-id>/spec.md
  root: specs

tasks:
  # Where SpecRelay keeps durable per-task run state and evidence, relative to
  # the project root.
  runs_root: .specrelay-runs/tasks
  # Cap on executor rework rounds `specrelay run` attempts before reporting
  # "maximum iterations reached" instead of pretending success.
  max_iterations: 3

roles:
  # Each role is configured with three explicit, provider-neutral keys:
  #   provider = which adapter/CLI runs the role. "claude" drives the Claude
  #              Code CLI; "fake" is a deterministic adapter for testing;
  #              "manual" (reviewer only) means no automated decision — a human
  #              runs `specrelay task accept` / `specrelay task request-changes`.
  #   model    = which provider model id to use, or "provider-default" to let
  #              the provider CLI pick its own default (SpecRelay passes no
  #              model flag). The model is an opaque string; SpecRelay does not
  #              validate vendor model names.
  #   agent    = which provider-specific agent/profile/subagent to use, or
  #              "none". "ai-reviewer" selects the bundled Claude reviewer
  #              sub-agent (installed at .claude/agents/ai-reviewer.md by
  #              `specrelay init`). See docs/providers.md.
  #
  # Legacy shorthand: `reviewer.provider: claude-subagent` still works and
  # normalizes internally to provider: claude + agent: ai-reviewer. The explicit
  # three-key form below is the preferred, provider-neutral way to say the same
  # thing.
  #
  # Role-specific env overrides (highest precedence) are also available:
  #   SPECRELAY_EXECUTOR_MODEL / SPECRELAY_REVIEWER_MODEL
  #   SPECRELAY_EXECUTOR_AGENT / SPECRELAY_REVIEWER_AGENT
  executor:
    provider: claude
    model: provider-default
    agent: none
  reviewer:
    provider: manual
    model: provider-default
    agent: none

context:
  # Optional context-retrieval capability required before roles do
  # substantive work. "none" performs no preflight. See
  # docs/context-adapters.md.
  adapter: none
  required: false

bundle:
  # Specification-directory input policy (spec 0023). See docs/configuration.md.
  # Whether `spec.md` is required at the root of a specification DIRECTORY
  # input. Never applies to a single-file input (the file itself is always
  # the specification regardless of its name).
  require_functional_spec: true
  # Extra comma-separated exclusion patterns, on top of the built-in defaults
  # (.git/, .specrelay-runs/, node_modules/, .DS_Store, *.tmp, *.swp).
  exclude: ""
  # Bundle discovery limits. Task creation fails clearly (never a silent
  # partial ingestion) when a directory input exceeds either limit.
  max_files: 2000
  max_total_bytes: 209715200

jam:
  # Jam recording capability (spec 0023). Jam is globally optional: leaving
  # this section absent (or required: false, the default) means Jam is only
  # ever required for a task whose bundle actually references a Jam
  # recording. Setting required: true makes `specrelay doctor` fail overall
  # readiness whenever Jam itself is not ready, even with no task referencing
  # it. See docs/jam-capability.md.
  required: false
  # retrieval_command: /path/to/jam-retrieve-adapter   # see docs/jam-capability.md

validation:
  # The command SpecRelay reports as this project's full test/validation
  # suite. Set it to whatever your project actually supports.
  full_test_command: "echo 'set validation.full_test_command in .specrelay/config.yml'"

policy:
  # A human must always give the final review after the automated loop
  # reaches READY_FOR_HUMAN_REVIEW. Keep this true.
  human_final_review_required: true
