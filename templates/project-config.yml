# project-config.yml — template for a project's .specrelay/config.yml.
#
# Copy this file to .specrelay/config.yml in the root of the project you want
# SpecRelay to inspect, then fill in the real values for that project. This
# file holds ONLY project-specific configuration/policy — never reusable
# SpecRelay engine code, never secrets, never machine-specific absolute paths.
version: 1

project:
  name: <Project Name>

specs:
  # Where specification documents live, relative to the project root.
  root: docs/sdd

tasks:
  # Where SpecRelay (or an existing workflow) keeps durable task run state,
  # relative to the project root.
  runs_root: .ai-runs/tasks
  # Cap on executor rework rounds a `specrelay run` will attempt before
  # reporting "maximum iterations reached" instead of pretending success.
  max_iterations: 3

workflow:
  # A short label for whichever workflow engine is currently authoritative
  # for this project. "legacy-ai-workflow" describes a pre-existing, in-repo
  # shell-script workflow being incubated away from; a project with no prior
  # workflow could use "none" or omit this key.
  current_engine: none
  # A short label for the context/retrieval capability this project requires
  # before automated roles do substantive work (if any).
  context_capability: none

roles:
  # Provider adapters for SpecRelay's own executor/reviewer roles (see
  # tools/specrelay/lib/specrelay/providers/). "manual" for the reviewer
  # means no automated review decision is made; a human runs
  # `specrelay task accept` / `specrelay task requeue` directly.
  executor:
    provider: claude
  reviewer:
    provider: manual

context:
  # Context-capability adapter (see tools/specrelay/lib/specrelay/context/).
  # "none" performs no preflight; a project requiring one (e.g. Context Plus)
  # sets adapter: contextplus and required: true.
  adapter: none
  required: false

bundle:
  # Specification-directory input policy (spec 0023); see
  # tools/specrelay/docs/configuration.md.
  require_functional_spec: true

jam:
  # Jam recording capability (spec 0023): globally optional, but a task
  # bundle that references a Jam recording still requires it for that task.
  # See tools/specrelay/docs/jam-capability.md.
  required: false

validation:
  # The real command used to run this project's test/validation suite.
  full_test_command: <run your test suite here>

policy:
  human_final_review_required: true
